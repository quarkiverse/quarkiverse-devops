name: "Terraform Plan"

on:
  workflow_run:
    workflows: ["Terraform"]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  issues: write
  contents: read
  pull-requests: write
  statuses: write
  actions: read

jobs:
  terraform_plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    if: >
      github.repository_owner == 'quarkiverse' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Download PR metadata
        uses: actions/download-artifact@v8
        with:
          name: terraform-pr-meta
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read PR metadata
        id: pr
        run: |
          echo "number=$(cat pr_number)" >> $GITHUB_OUTPUT
          echo "head_sha=$(cat head_sha)" >> $GITHUB_OUTPUT
          echo "tf_changed=$(cat tf_changed)" >> $GITHUB_OUTPUT

      - name: Skip if no Terraform changes
        if: steps.pr.outputs.tf_changed != 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.pr.outputs.head_sha }}',
              state: 'success',
              context: 'Terraform Plan',
              description: 'No Terraform files changed'
            });

      - name: Set pending status
        if: steps.pr.outputs.tf_changed == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.pr.outputs.head_sha }}',
              state: 'pending',
              context: 'Terraform Plan',
              description: 'Running terraform plan...'
            });

      - name: Download Terraform scripts
        if: steps.pr.outputs.tf_changed == 'true'
        uses: actions/download-artifact@v8
        with:
          name: terraform-pr-scripts
          path: terraform-scripts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Terraform
        if: steps.pr.outputs.tf_changed == 'true'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.0"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        if: steps.pr.outputs.tf_changed == 'true'
        id: init
        working-directory: ./terraform-scripts
        run: terraform init

      - name: Terraform Validate
        if: steps.pr.outputs.tf_changed == 'true'
        id: validate
        working-directory: ./terraform-scripts
        run: terraform validate -no-color

      - name: Terraform Plan
        if: steps.pr.outputs.tf_changed == 'true'
        id: plan
        working-directory: ./terraform-scripts
        run: |
          echo 'PLAN_RESULTS<<EOF' >> $GITHUB_ENV
          terraform plan -no-color | grep -v "Refreshing state...\|Reading...\|Read complete after" >> $GITHUB_ENV
          echo 'EOF' >> $GITHUB_ENV
        continue-on-error: true

      - name: Post PR comment
        if: steps.pr.outputs.tf_changed == 'true' && always()
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);

            // 1. Retrieve existing bot comments for the PR
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })
            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Terraform Format and Style')
            })

            // 2. Prepare format of the comment
            const output = `#### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            <details><summary>Validation Output</summary>

            \`\`\`\n
            ${{ steps.validate.outputs.stdout }}
            \`\`\`

            </details>

            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            \`\`\`terraform\n
            ${{ env.PLAN_RESULTS }}
            \`\`\`

            *Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;

            // 3. If we have a comment, update it, otherwise create a new one
            if (botComment) {
              github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              })
            } else {
              github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              })
            }

      - name: Set final status
        if: steps.pr.outputs.tf_changed == 'true' && always()
        uses: actions/github-script@v9
        with:
          script: |
            const planOutcome = '${{ steps.plan.outcome }}';
            const initOutcome = '${{ steps.init.outcome }}';
            const validateOutcome = '${{ steps.validate.outcome }}';
            const failed = [planOutcome, initOutcome, validateOutcome].includes('failure');
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.pr.outputs.head_sha }}',
              state: failed ? 'failure' : 'success',
              context: 'Terraform Plan',
              description: failed ? 'Terraform plan failed' : 'Terraform plan succeeded'
            });

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
